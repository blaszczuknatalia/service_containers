name: Deploy to Azure (OIDC)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure connection
        run: |
          az account show
          az group list --output table

      - name: Deploy
        run: |
          az group show --name AZ-RG-NBTest --output table

      - name: Placeholder
        run: echo "TODO - implement OIDC login and deployment"
