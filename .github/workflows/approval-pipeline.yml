name: Deployment with Manual Approval

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build application
        run: |
          echo "Building application..."
          echo "Build artifact: app-${{ github.sha }}"

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deployed to staging"

  test-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Run smoke tests on staging
        run: |
          echo "Running smoke tests..."
          echo "All tests passed"

  approve-production:
    needs: test-staging
    runs-on: ubuntu-latest
    environment:
      name: production-approval
      url: https://example.com/approval
    steps:
      - name: Awaiting approval for production deployment
        run: echo "Waiting for approval to deploy to production..."

  deploy-production:
    needs: approve-production
    runs-on: ubuntu-latest
    environment: 
      name: production
      url: https://example.com
    steps:
      - name: Deploy to production
        run: echo "Deployed to production"

  post-deploy:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Verify production
        run: echo "Production smoke tests passed"