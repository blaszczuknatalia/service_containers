name: Supply Chain Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4      # TODO: Pin by SHA
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4      # TODO: Pin by SHA

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: +security-extended

      # TODO: Add autobuild

      # TODO: Add analyze with category

  build:
    runs-on: ubuntu-latest
    needs: [codeql-analysis]
    # TODO: Add permissions for attestation (contents: read, id-token: write, attestations: write)
    steps:
      - uses: actions/checkout@v4      # TODO: Pin by SHA

      - uses: actions/setup-node@v4    # TODO: Pin by SHA
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Create artifact
        run: tar -czf app.tar.gz dist/

      # TODO: Add actions/attest-build-provenance
      #   - subject-path: 'app.tar.gz'

      - uses: actions/upload-artifact@v4   # TODO: Pin by SHA
        with:
          name: app-artifact
          path: app.tar.gz
          retention-days: 5